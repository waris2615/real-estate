<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties | LuxeEstates</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <div class="logo">
                <h1>LUXEESTATES</h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="listings.html" class="active">Listings</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2 class="section-title">All Properties</h2>

        <section class="search-section" style="margin-top: 0;">
            <input type="text" id="searchInput" placeholder="Search by location or keywords...">
            <select id="typeSelect">
                <option value="All">All Types</option>
                <option value="House">House</option>
                <option value="Villa">Villa</option>
                <option value="Apartment">Apartment</option>
                <option value="Townhouse">Townhouse</option>
                <option value="Cabin">Cabin</option>
            </select>
            <select id="priceSelect">
                <option value="All">Any Price</option>
                <option value="Low">Under $2M</option>
                <option value="Medium">$2M - $4M</option>
                <option value="High">Over $4M</option>
            </select>
        </section>

        <div class="property-grid" id="listingsGrid">
            <!-- Properties will be injected here by JS -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 LuxeEstates. All rights reserved.</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        // Init listings page
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initListings === 'function') {
                initListings();
            }
        });
    </script>
</body>
</html>
