<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | LuxeEstates</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <div class="logo">
                <a href="index.html"><h1>LUXEESTATES</h1></a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="listings.html">Listings</a>
                <a href="about.html">About</a>
                <a href="contact.html" class="active">Contact</a>
            </div>
        </div>
    </nav>

    <header class="hero" style="height: 40vh; background-image: linear-gradient(rgba(26, 54, 93, 0.8), rgba(26, 54, 93, 0.8)), url('https://images.unsplash.com/photo-1516156008625-3a9d6067fab5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
        <div class="container hero-content">
            <h2>Get in Touch</h2>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">Contact Our Agents</h2>

        <form class="contact-form" id="contactForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe">
                <span class="error-msg" id="nameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com">
                <span class="error-msg" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="How can we help you?"></textarea>
                <span class="error-msg" id="messageError"></span>
            </div>

            <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            <div id="successMsg" style="display: none; color: green; margin-top: 1rem; text-align: center; font-weight: bold;">Thank you! Your message has been sent.</div>
        </form>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 LuxeEstates. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initContactForm === 'function') {
                initContactForm();
            }
        });
    </script>
</body>
</html>
